experiment:
  name: "UMAFALL_Experiment"
  description: "使用UMAFALL数据集训练的SqueezeNet模型"
  author: "Your Name"
  timestamp: "auto"


dataset:
  name: "UMAFALL"
  data_path: "F:/PycharmProjects/project1/EdgeFallNet/datasets/UMAFALL/UMAFALL_Data.pkl"
  label_path: "F:/PycharmProjects/project1/EdgeFallNet/datasets/UMAFALL/UMAFALL_lable.pkl"
  input_shape: [300, 6]
  num_classes: 1
  test_size: 0.3
  val_size: 0.5
  random_state: 42
  shuffle: true
  stratify: true
  reshape: true  # UMAFALL数据需要reshape

model:
  name: "EdgeFallNet_UMAFALL"
  architecture: "EdgeFallNet"
  initial_conv_filters: 8
  fire1_squeeze: 4
  fire1_expand1x1: 2
  fire1_expand3x3: 6
  fire2_squeeze: 4
  fire2_expand1x1: 2
  fire2_expand3x3: 6
  dense_units: 8
  dropout_rate: 0.1
  use_separable: true
  num_classes: 1

training:
  batch_size: 32
  epochs: 120
  learning_rate: 0.01
  optimizer: "adamax"
  loss: "binary_crossentropy"
  metrics: ["accuracy"]
  use_early_stopping: true
  early_stopping_patience: 20
  use_reduce_lr: true
  reduce_lr_patience: 10
  reduce_lr_factor: 0.5
  min_lr: 0.000001

logging:
  use_tensorboard: false
  log_dir: "logs"
  model_save_dir: "saved_models"
  experiment_dir: "experiments"
  save_format: "h5" #可以是h5, tf, 或tflite
  save_best_only: true
  monitor_metric: "val_loss"
  monitor_mode: "min"
  verbose: 1